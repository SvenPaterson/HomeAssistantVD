- id: bank_of_dad_daily_interest
  alias: Bank of Dad - Daily interest (from monthly rate)
  mode: single
  trigger:
  - platform: time
    at: 00:05:00
  action:
  - variables:
      r_m: '{{ states(''input_number.bank_of_dad_interest_rate_monthly'')|float(0)
        / 100 }}'
      r_d: '{{ (1 + r_m) ** (1/30) - 1 }}'
      ben_before: '{{ states(''input_number.ben_balance'')|float(0) }}'
      lewis_before: '{{ states(''input_number.lewis_balance'')|float(0) }}'
      ben_interest: '{{ (ben_before * r_d) | round(2) }}'
      lewis_interest: '{{ (lewis_before * r_d) | round(2) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.ben_balance
    data:
      value: '{{ (ben_before + ben_interest) | round(2) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.lewis_balance
    data:
      value: '{{ (lewis_before + lewis_interest) | round(2) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.ben_interest_total
    data:
      value: '{{ (states(''input_number.ben_interest_total'')|float(0) + ben_interest)
        | round(2) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.lewis_interest_total
    data:
      value: '{{ (states(''input_number.lewis_interest_total'')|float(0) + lewis_interest)
        | round(2) }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.ben_interest_last
    data:
      value: '{{ ben_interest }}'
  - service: input_number.set_value
    target:
      entity_id: input_number.lewis_interest_last
    data:
      value: '{{ lewis_interest }}'
- id: '1774708171928'
  alias: Ring Doorbell
  description: triggers doorbell wav when doorbell binary sensor triggers
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.motion_doorbell_binarysensor
    from:
    - 'off'
    - 'on'
  conditions:
  - condition: state
    entity_id: timer.silence_doorbell
    state: idle
  - condition: or
    conditions:
    - condition: state
      entity_id: person.stephengarden
      state: home
    - condition: state
      entity_id: person.lindsay_garden
      state: home
  - condition: not
    conditions:
    - condition: state
      entity_id: alarm_control_panel.4216_victoria_dr_alarm_control_panel_alarm_control_panel
      state: armed_home
  actions:
  - variables:
      speaker: media_player.kitchen_ha_voice_media_player
      previous_volume: >
        {{ state_attr(speaker, 'volume_level') | float(0.5) }}
      quiet_time: >
        {{ states('input_datetime.doorbell_quiet_time') }}
      is_quiet_hours: >
        {{ quiet_time != '00:00:00' and now().strftime('%H:%M:%S') >= quiet_time }}
      target_volume: >
        {% if is_quiet_hours %}
          0.5
        {% else %}
          {{ states('input_number.doorbell_volume') | float(70) / 100 }}
        {% endif %}
  - action: media_player.volume_set
    target:
      entity_id: "{{ speaker }}"
    data:
      volume_level: "{{ target_volume }}"
  - action: media_player.play_media
    metadata: {}
    target:
      entity_id: "{{ speaker }}"
    data:
      media:
        media_content_id: media-source://media_source/local/doorbell-1.wav
        media_content_type: audio/x-wav
        metadata:
          title: doorbell-1.wav
          thumbnail:
          media_class: music
          children_media_class:
          navigateIds:
          - {}
          - media_content_type: app
            media_content_id: media-source://media_source
          browse_entity_id: media_player.kitchen_ha_voice_media_player
      announce: true
  - delay:
      seconds: 5
  - action: media_player.volume_set
    target:
      entity_id: "{{ speaker }}"
    data:
      volume_level: "{{ previous_volume }}"
  mode: single

- id: smoke_detector_monthly_trigger
  alias: "Smoke Detector — Monthly Reminder Trigger"
  description: "Fires on the first Saturday of each month at 8 AM to prompt smoke detector testing"
  triggers:
    - platform: time
      at: "08:00:00"
  conditions:
    - alias: "First Saturday of month"
      condition: template
      value_template: "{{ now().weekday() == 5 and now().day <= 7 }}"
  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.smoke_detector_snooze_until
      data:
        datetime: "1970-01-01 00:00:00"
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.smoke_detector_test_needed
  mode: single

- id: smoke_detector_notification_action
  alias: "Smoke Detector — Handle Notification Action"
  description: "Handles Tested / Snooze Evening / Snooze Tomorrow responses to the smoke detector test reminder"
  triggers:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: smoke_tested
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: smoke_snooze_evening
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: smoke_snooze_tomorrow
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'smoke_tested' }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.smoke_detector_test_needed
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.smoke_detector_last_tested
              data:
                date: "{{ now().strftime('%Y-%m-%d') }}"
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'smoke_snooze_evening' }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.smoke_detector_snooze_until
              data:
                datetime: "{{ now().replace(hour=19, minute=0, second=0, microsecond=0) }}"
        - conditions:
            - condition: template
              value_template: "{{ trigger.event.data.action == 'smoke_snooze_tomorrow' }}"
          sequence:
            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.smoke_detector_snooze_until
              data:
                datetime: "{{ (now() + timedelta(days=1)).replace(hour=8, minute=0, second=0, microsecond=0) }}"
  mode: single
