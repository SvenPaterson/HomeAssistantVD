- id: '1674435262405'
  alias: 'UTILITIES: Hot Water Boost'
  description: ''
  triggers:
  - entity_id:
    - input_boolean.hot_water_boost
    from: 'off'
    to: 'on'
    id: boost_mode_activated
    trigger: state
  - entity_id:
    - timer.hot_water_boost_mode_timer
    from: active
    to: idle
    id: boost_mode_timer_stopped
    trigger: state
  - entity_id:
    - input_boolean.hot_water_boost
    from: 'on'
    to: 'off'
    id: boost_mode_cancelled
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: boost_mode_activated
      sequence:
      - action: climate.set_preset_mode
        target:
          device_id: ae6e50688646a01cbfe8c0c68d48baa8
        data:
          preset_mode: High Demand
      - data: {}
        target:
          entity_id: timer.hot_water_boost_mode_timer
        action: timer.start
    - conditions:
      - condition: trigger
        id: boost_mode_timer_stopped
      sequence:
      - action: climate.set_preset_mode
        target:
          device_id: ae6e50688646a01cbfe8c0c68d48baa8
        data:
          preset_mode: Heat Pump
      - data: {}
        target:
          entity_id: input_boolean.hot_water_boost
        action: input_boolean.turn_off
    - conditions:
      - condition: trigger
        id: boost_mode_cancelled
      - condition: state
        entity_id: timer.hot_water_boost_mode_timer
        state: active
      sequence:
      - action: climate.set_preset_mode
        target:
          device_id: ae6e50688646a01cbfe8c0c68d48baa8
        data:
          preset_mode: Heat Pump
      - data: {}
        target:
          entity_id: timer.hot_water_boost_mode_timer
        action: timer.cancel
  mode: parallel
