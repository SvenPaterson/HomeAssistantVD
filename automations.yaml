- id: '1726002348254'
  alias: 'BASEMENT: Water Leak Detected'
  description: What will happen if water is detected in the basement
  triggers:
  - type: moist
    device_id: 2ab23a7631af7a31eeea156c467b872f
    entity_id: bc37ae6feb2891abee30bb0f42956fc7
    domain: binary_sensor
    trigger: device
  - trigger: state
    entity_id:
    - binary_sensor.titan_water_valve_actuator_water_leak_detected
    from: 'off'
    to: 'on'
  conditions: []
  actions:
  - type: turn_off
    device_id: 7128b104780e8c622078ae0fff2e2f6b
    entity_id: 91c59e70b92e659bfff4619f93d9f991
    domain: switch
  - action: scene.turn_on
    target:
      entity_id: scene.important_announcement
    data: {}
  - repeat:
      while:
      - type: is_moist
        condition: device
        device_id: 2ab23a7631af7a31eeea156c467b872f
        entity_id: bc37ae6feb2891abee30bb0f42956fc7
        domain: binary_sensor
      sequence:
      - data:
          message: Water detected in the basement!
          title: Water Leak!!!
          data:
            push:
              sound:
                name: default
                critical: 1
                volume: 1
        action: notify.mobile_app_stephen_iphone
      - action: notify.mobile_app_iphone_2
        metadata: {}
        data:
          message: Water detected in the basement!
          data:
            push:
              sound:
                name: default
                critical: 1
                volume: 1
          title: Water Leak!!!
      - action: tts.speak
        metadata: {}
        data:
          cache: true
          message: Warning! Water detected in the basement!
          media_player_entity_id: media_player.announcement_group
        target:
          entity_id: tts.openai_tts_tts_1_hd
      - delay:
          hours: 0
          minutes: 5
          seconds: 0
          milliseconds: 0
  - action: scene.turn_on
    target:
      entity_id: scene.return_to_normal_volume
    data: {}
  mode: single
