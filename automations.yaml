- id: '1735571609904'
  alias: 'BASEMENT: Log Sump Pump Activation Time'
  description: 'Sets the datetime when the sump pump sensor triggers, sends first-run
    alert if 24+ hours since last activation'
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.sump_pump_active
    from: 'off'
    to: 'on'
  conditions: []
  actions:
  - variables:
      last_started: "{{ state_attr('input_datetime.sump_pump_last_started', 'timestamp') | float(0) }}"
      hours_since: "{{ ((now().timestamp() - last_started) / 3600) | round(1) }}"
  - if:
    - condition: template
      value_template: "{{ hours_since >= 24 }}"
    then:
    - action: notify.mobile_app_stephen_iphone
      data:
        title: Basement
        message: "Sump pump activated for the first time in {{ hours_since }} hours."
  - target:
      entity_id: input_datetime.sump_pump_last_started
    data:
      timestamp: '{{now().timestamp()}}'
    action: input_datetime.set_datetime
  mode: single
- id: '1735572810967'
  alias: 'BASEMENT: Calculate Pump Runtime'
  description: Add new activation duration to daily/lifetime/period totals, update
    rolling average, and alert on long runs (>15s)
  triggers:
  - entity_id: binary_sensor.sump_pump_active
    from: 'on'
    to: 'off'
    trigger: state
  actions:
  - variables:
      start_time: '{{ state_attr(''input_datetime.sump_pump_last_started'', ''timestamp'')
        | float }}'
      end_time: '{{ now().timestamp() | float }}'
      duration_secs: '{{ (end_time - start_time) | round(0) }}'
      runtime: '{{ (end_time - start_time) / 3600 | round(1) }}'
      old_avg: '{{ states(''input_number.sump_pump_rolling_avg_duration'') | float(0) }}'
      new_avg: '{{ (0.9 * old_avg + 0.1 * duration_secs) | round(1) if old_avg > 0 else duration_secs | round(1) }}'
  - target:
      entity_id: input_number.sump_pump_last_runtime
    data:
      value: '{{ duration_secs }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.sump_pump_total_hrs
    data:
      value: '{{ (states(''input_number.sump_pump_total_hrs'') | float) + runtime
        }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.sump_pump_period_runtime
    data:
      value: >
        {{ (states('input_number.sump_pump_period_runtime') | float) +
           duration_secs }}
    action: input_number.set_value
  - target:
      entity_id: input_number.sump_pump_rolling_avg_duration
    data:
      value: '{{ new_avg }}'
    action: input_number.set_value
  - if:
    - condition: template
      value_template: '{{ duration_secs | float > 15 }}'
    then:
    - action: notify.mobile_app_stephen_iphone
      data:
        title: "⚠️ Basement — Long Pump Run"
        message: >
          Sump pump ran for {{ duration_secs }}s (rolling avg: {{ new_avg }}s).
          Possible significant water intrusion.
  mode: single
