- id: '1765044327156'
  alias: Family Room TV Input Manager
  description: >
    Manages Family Room LG TV input switching based on Chromecast and Xbox state.
    Wakes TV when a device activates, switches inputs when devices change,
    turns off TV when last device goes inactive (unless source is Switch).
  triggers:
  - trigger: state
    entity_id: media_player.family_room_tv
    from:
    - 'off'
    - unknown
    - unavailable
    to:
    - idle
    - buffering
    - playing
    id: cast_on
  - trigger: state
    entity_id: media_player.family_room_tv
    from: idle
    to:
    - playing
    - buffering
    id: cast_playing
  - trigger: state
    entity_id: media_player.family_room_tv
    to: 'off'
    for: "00:00:10"
    id: cast_stop
  - trigger: state
    entity_id: remote.office_xbox
    to: 'on'
    id: xbox_on
  - trigger: state
    entity_id: remote.office_xbox
    to: 'off'
    for: "00:00:05"
    id: xbox_off
  actions:
  - choose:
    # ── DEVICE ACTIVATED: wake TV + select source ──
    - conditions:
      - condition: template
        value_template: "{{ trigger.id in ['cast_on', 'cast_playing', 'xbox_on'] }}"
      sequence:
      - variables:
          desired_source: "{{ 'Chromecast' if trigger.id in ['cast_on', 'cast_playing'] else 'Xbox' }}"
      # Skip if TV already on the correct source
      - condition: template
        value_template: >
          {{ not (is_state('media_player.family_room_lgtv', 'on')
                  and state_attr('media_player.family_room_lgtv', 'source') == desired_source) }}
      # For cast_on (idle): only steal focus from another input if TV is off.
      # cast_playing (idle→playing/buffering) always steals focus since it's active casting.
      - condition: template
        value_template: >
          {{ trigger.id != 'cast_on'
             or not is_state('media_player.family_room_lgtv', 'on') }}
      # Wake TV via WOL
      - action: wake_on_lan.send_magic_packet
        data:
          mac: A8:23:FE:10:C8:7E
      - wait_template: >
          {{ states('media_player.family_room_lgtv') not in ['unknown', 'unavailable'] }}
        timeout: 00:00:20
        continue_on_timeout: true
      # Retry source selection up to 4 times
      - repeat:
          count: 4
          sequence:
          - action: media_player.select_source
            target:
              entity_id: media_player.family_room_lgtv
            data:
              source: "{{ desired_source }}"
          - delay: 00:00:02
          - condition: template
            value_template: >
              {{ state_attr('media_player.family_room_lgtv', 'source') == desired_source }}

    # ── CHROMECAST STOPPED: switch to Xbox or turn off TV ──
    - conditions:
      - condition: trigger
        id: cast_stop
      sequence:
      - delay: 00:00:03
      # Only act if TV is still on
      - condition: state
        entity_id: media_player.family_room_lgtv
        state: 'on'
      - choose:
        # Xbox is on → switch to Xbox
        - conditions:
          - condition: state
            entity_id: remote.office_xbox
            state: 'on'
          sequence:
          - action: media_player.select_source
            target:
              entity_id: media_player.family_room_lgtv
            data:
              source: Xbox
        default:
        # No Xbox active — only turn off TV if source is a tracked input
        - condition: template
          value_template: >
            {{ state_attr('media_player.family_room_lgtv', 'source') in ['Chromecast', 'Xbox'] }}
        - action: media_player.turn_off
          target:
            entity_id: media_player.family_room_lgtv

    # ── XBOX TURNED OFF: switch to Chromecast or turn off TV ──
    - conditions:
      - condition: trigger
        id: xbox_off
      sequence:
      # Confirm Xbox is still off
      - condition: state
        entity_id: remote.office_xbox
        state: 'off'
      # Only act if TV is still on
      - condition: state
        entity_id: media_player.family_room_lgtv
        state: 'on'
      - choose:
        # Chromecast is active → switch to Chromecast
        - conditions:
          - condition: template
            value_template: >
              {{ states('media_player.family_room_tv') in ['idle', 'buffering', 'playing'] }}
          sequence:
          - repeat:
              count: 4
              sequence:
              - action: media_player.select_source
                target:
                  entity_id: media_player.family_room_lgtv
                data:
                  source: Chromecast
              - delay: 00:00:02
              - condition: template
                value_template: >
                  {{ state_attr('media_player.family_room_lgtv', 'source') == 'Chromecast' }}
        default:
        # No Chromecast active — only turn off TV if source is a tracked input
        - condition: template
          value_template: >
            {{ state_attr('media_player.family_room_lgtv', 'source') in ['Chromecast', 'Xbox'] }}
        - action: media_player.turn_off
          target:
            entity_id: media_player.family_room_lgtv
  mode: restart
- id: '1744334400000'
  alias: LGTV Off - Stop Chromecast
  description: When the LG TV turns off, stop the Chromecast to prevent it casting to nothing
  triggers:
  - trigger: state
    entity_id: media_player.family_room_lgtv
    to: 'off'
  conditions:
  - condition: template
    value_template: >
      {{ states('media_player.family_room_tv') not in ['off', 'unknown', 'unavailable'] }}
  actions:
  - action: media_player.turn_off
    target:
      entity_id: media_player.family_room_tv
  mode: single
- id: '1744334400001'
  alias: Family Room TV - Pause Media on Input Switch
  description: >
    When the TV input source changes, pause whatever was playing on the
    previous source so it doesn't keep running in the background.
  triggers:
  - trigger: state
    entity_id: media_player.family_room_lgtv
    attribute: source
  conditions:
  - condition: state
    entity_id: media_player.family_room_lgtv
    state: 'on'
  actions:
  - variables:
      old_source: "{{ trigger.from_state.attributes.source | default('') }}"
  # Pause Chromecast if we switched away from it
  - if:
    - condition: template
      value_template: >
        {{ old_source == 'Chromecast'
           and states('media_player.family_room_tv') in ['playing', 'buffering'] }}
    then:
    - action: media_player.media_pause
      target:
        entity_id: media_player.family_room_tv
  # Turn off Xbox if we switched away from it
  - if:
    - condition: template
      value_template: >
        {{ old_source == 'Xbox'
           and is_state('remote.office_xbox', 'on') }}
    then:
    - action: remote.turn_off
      target:
        entity_id: remote.office_xbox
  mode: single
