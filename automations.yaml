- id: '1735251248014'
  alias: 'BASEMENT: Kitchen Undercabinet Vacuum'
  description: ''
  triggers:
  - entity_id: binary_sensor.kitchenkickplatetrigger_kickplate_switch
    from: 'off'
    to: 'on'
    id: off_to_on
    trigger: state
  - entity_id: binary_sensor.kitchenkickplatetrigger_kickplate_switch
    from: 'on'
    to: 'off'
    id: on_to_off
    trigger: state
  - event_type: timer.finished
    event_data:
      entity_id: timer.undercabinet_vacuum
    trigger: event
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: off_to_on
      sequence:
      - target:
          entity_id: switch.kitchen_vacuum_power
        action: switch.turn_on
        data: {}
      - data:
          entity_id: timer.undercabinet_vacuum
        action: timer.start
    - conditions:
      - condition: trigger
        id: on_to_off
      sequence:
      - data:
          entity_id: timer.undercabinet_vacuum
        action: timer.cancel
      - target:
          entity_id: switch.kitchen_vacuum_power
        action: switch.turn_off
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.entity_id == ''timer.undercabinet_vacuum''
          }}'
      sequence:
      - target:
          entity_id: switch.kitchen_vacuum_power
