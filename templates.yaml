# Template sensors for tracking the sump pump activations
- sensor:
    - name: "Sump Pump Activations Daily"
      state: "{{ states('input_number.sump_pump_activations_daily') }}"
      unit_of_measurement: "num"
      icon: mdi:counter

    - name: "Sump Pump Lifetime Activations"
      state: "{{ states('input_number.sump_pump_lifetime_activations') }}"
      unit_of_measurement: "num"
      icon: mdi:counter

    - name: "Sump Pump Runtime Daily"
      state: "{{ states('input_number.sump_pump_runtime_daily') }}"
      unit_of_measurement: "s"
      icon: mdi:timer

    - name: "Sump Pump Total Hours"
      state: "{{ states('input_number.sump_pump_total_hrs') }}"
      unit_of_measurement: "hrs"
      icon: mdi:clock

    - name: "Sump Pump Average Duration Per Activation"
      state: >
        {% set activations = states('input_number.sump_pump_activations_daily') | float %}
        {% set runtime = states('input_number.sump_pump_runtime_daily') | float %}
        {{ (runtime / activations) if activations > 0 else 0 }}
      unit_of_measurement: "s"
      icon: mdi:timer

    - name: "Power Meter Mains Total Watts"
      unique_id: power_meter_mains_total_watts
      state: >
        {{ (states('sensor.power_meter_mains_l1_watts') | float(0))
           + (states('sensor.power_meter_mains_l2_watts') | float(0)) }}
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      icon: mdi:flash

    - name: HACS Pending Updates
      state: >
        {{ states.update
            | selectattr('entity_id','search','^update\.hacs')
            | selectattr('state','eq','on')
            | list | count }}

    - name: "Rain Next 3 Days In"
      unique_id: rain_next_3_days_in
      unit_of_measurement: "in"
      state: >
        {{ (
          states('sensor.pirateweather_precip_accumulation_1d')|float(0) +
          states('sensor.pirateweather_precip_accumulation_2d')|float(0) +
          states('sensor.pirateweather_precip_accumulation_3d')|float(0)
        ) | round(2) }}

    # E. Track historical daily max temperatures using modern template sensors
    - unique_id: tpl_yesterday_max_temp
      name: "Yesterday Max Temp"
      unit_of_measurement: "°F"
      state: "{{ states('input_number.yesterday_max_temp') | float(0) }}"

    - unique_id: tpl_day_before_yesterday_max_temp
      name: "Day Before Yesterday Max Temp"
      unit_of_measurement: "°F"
      state: "{{ states('input_number.day_before_yesterday_max_temp') | float(0) }}"

    - unique_id: tpl_three_days_ago_max_temp
      name: "Three Days Ago Max Temp"
      unit_of_measurement: "°F"
      state: "{{ states('input_number.three_days_ago_max_temp') | float(0) }}"

    - unique_id: tpl_hot_streak_last_3_days
      name: "Hot Streak Last 3 Days"
      state: >
        {{
          states('sensor.yesterday_max_temp')|float(0) >= 80 and
          states('sensor.day_before_yesterday_max_temp')|float(0) >= 80 and
          states('sensor.three_days_ago_max_temp')|float(0) >= 80
        }}

    # bank of dad helpers for projecting amounts into future
    - name: "Ben Balance in 12 Months"
      unique_id: ben_balance_in_12_months
      state: >
        {% set bal = states('input_number.ben_balance')|float(0) %}
        {% set r_m_raw = states('input_number.bank_of_dad_interest_rate_monthly')|float(0) %}
        {% set r_m = r_m_raw / 100 %}
        $ {{ '%.2f'|format(bal * ((1 + r_m) ** 12)) }}

    - name: "Lewis Balance in 12 Months"
      unique_id: lewis_balance_in_12_months
      state: >
        {% set bal = states('input_number.lewis_balance')|float(0) %}
        {% set r_m_raw = states('input_number.bank_of_dad_interest_rate_monthly')|float(0) %}
        {% set r_m = r_m_raw / 100 %}
        $ {{ '%.2f'|format(bal * ((1 + r_m) ** 12)) }}

    - name: "Ben Magic Money Percent"
      unique_id: ben_magic_money_percent
      unit_of_measurement: "%"
      state: >
        {% set bal = states('input_number.ben_balance')|float(0) %}
        {% set magic = states('input_number.ben_interest_total')|float(0) %}
        {% if bal <= 0 %}0{% else %}{{ (100 * magic / bal) | round(1) }}{% endif %}

    - name: "Lewis Magic Money Percent"
      unique_id: lewis_magic_money_percent
      unit_of_measurement: "%"
      state: >
        {% set bal = states('input_number.lewis_balance')|float(0) %}
        {% set magic = states('input_number.lewis_interest_total')|float(0) %}
        {% if bal <= 0 %}0{% else %}{{ (100 * magic / bal) | round(1) }}{% endif %}

        # read only display sensors for dashboard view
    - name: "Ben Balance (Display)"
      unique_id: ben_balance_display
      state: >
        $ {{ '%.2f'|format(states('input_number.ben_balance')|float(0)) }}

    - name: "Lewis Balance (Display)"
      unique_id: lewis_balance_display
      state: >
        $ {{ '%.2f'|format(states('input_number.lewis_balance')|float(0)) }}

    - name: "Ben Magic Money Total (Display)"
      unique_id: ben_magic_money_total_display
      state: >
        $ {{ '%.2f'|format(states('input_number.ben_interest_total')|float(0)) }}

    - name: "Lewis Magic Money Total (Display)"
      unique_id: lewis_magic_money_total_display
      state: >
        $ {{ '%.2f'|format(states('input_number.lewis_interest_total')|float(0)) }}

    - name: "Ben Magic Money Today (Display)"
      unique_id: ben_magic_money_today_display
      state: >
        $ {{ '%.2f'|format(states('input_number.ben_interest_last')|float(0)) }}

    - name: "Lewis Magic Money Today (Display)"
      unique_id: lewis_magic_money_today_display
      state: >
        $ {{ '%.2f'|format(states('input_number.lewis_interest_last')|float(0)) }}

- binary_sensor:
    # For Govee bluetooth thermohygrometer battery level alert
    # Ignores devices that have been unavailable for less than 60 minutes
    - name: "Device With Low Battery"
      state: >
        {% set govee_sensors = [
          'sensor.basement_thermohygrometer_battery',
          'sensor.guest_room_thermohygrometer_battery',
          'sensor.master_bedroom_thermohygrometer_battery'
        ] %}
        {% set low_battery_devices = [] %}
        {% for sensor in govee_sensors %}
          {% set sensor_state = states(sensor) %}
          {% if sensor_state not in ['unknown', 'unavailable'] %}
            {# Device is available, check battery level #}
            {% if sensor_state|float(default=100) < 30 %}
              {% set low_battery_devices = low_battery_devices + [sensor] %}
            {% endif %}
          {% elif sensor_state in ['unknown', 'unavailable'] %}
            {# Device is unavailable, check how long #}
            {% set last_changed = state_attr(sensor, 'last_changed') %}
            {% if last_changed %}
              {% set minutes_unavailable = (now() - last_changed).total_seconds() / 60 %}
              {# Only trigger if unavailable for more than 60 minutes #}
              {% if minutes_unavailable > 60 %}
                {% set low_battery_devices = low_battery_devices + [sensor] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ low_battery_devices|length > 0 }}
      device_class: battery
      icon: mdi:battery

    ### SUMP PUMP LONG RUN ALERT ###
    - name: "Sump Pump Running Too Long"
      unique_id: sump_pump_running_too_long
      state: >
        {{ is_state('binary_sensor.sump_pump_active', 'on') and
           (now() - states.binary_sensor.sump_pump_active.last_changed).total_seconds() > 120 }}
      delay_on:
        seconds: 120
      icon: mdi:pump

    ### IRRIGATION ALERT ###
    # 2. 7-day rain deficit (< 0.5 in)
    - name: "Weekly Rain Below Target"
      unique_id: bs_weekly_rain_deficit
      state: >
        {% set v = states('sensor.rain_past_7_days_in') %}
        {{ v not in ['unknown','unavailable','none'] and v|float < 0.5 }}
      icon: mdi:weather-rainy

    # 3. All of last 3 days hit ≥ 80 °F
    - name: "Hot Streak Last 3 Days"
      unique_id: bs_hot_streak_3
      state: >
        {{ is_state('sensor.hot_streak_last_3_days', 'True') }}
      icon: mdi:sun-thermometer

    # 4. No precip in next 3 days
    - name: "No Rain Next 3 Days"
      unique_id: bs_no_rain_next3
      state: >
        {{ states('sensor.rain_next_3_days_in')|float(1) < 0.1 }}
      icon: mdi:white-balance-sunny

    # 5. Final irrigation alert condition
    - name: "Irrigation Needed Condition"
      unique_id: bs_irrigation_needed
      state: >
        {{
          is_state('input_boolean.test_override_irrigation', 'on') or
          (
            is_state('binary_sensor.weekly_rain_below_target', 'on') and
            is_state('binary_sensor.hot_streak_last_3_days', 'on') and
            is_state('binary_sensor.no_rain_next_3_days', 'on') and
            is_state('input_boolean.watered_recently', 'off')
          )
        }}
    ### END IRRIGATION ###
    ### HOT WATER TANK ###
    - name: "Hot Water Low Temperature"
      state: >
        {% set temp_state = states('sensor.econet_hpwh_upper_tank_temperature') %}
        {% if temp_state not in ['unknown', 'unavailable'] %}
          {{ temp_state | float(0) < 100 }}
        {% else %}
          false
        {% endif %}
      device_class: problem

    - name: "Hot Water Tank Lower Sensor Unavailable 6+ Hours"
      unique_id: hot_water_sensor_unavailable_6hr
      state: >
        {% set sensor_state = states('sensor.econet_hpwh_upper_tank_temperature') %}
        {% if sensor_state in ['unknown', 'unavailable'] %}
          {% set last_changed = state_attr('sensor.econet_hpwh_upper_tank_temperature', 'last_changed') %}
          {% if last_changed %}
            {{ (now() - last_changed).total_seconds() > 21600 }}
          {% else %}
            false
          {% endif %}
        {% else %}
          false
        {% endif %}
      device_class: problem
      icon: mdi:water-thermometer-outline
    ### END HOT WATER TANK ###

    - name: "Kids WiFi 5 Min Warning"
      state: >
        {% if is_state('timer.kids_wifi_timer', 'active') %}
          {% set finishes = state_attr('timer.kids_wifi_timer', 'finishes_at') %}
          {% if finishes %}
            {% set finish_time = as_timestamp(finishes) %}
            {% set current_time = as_timestamp(now()) %}
            {% set seconds_left = finish_time - current_time %}
            {{ 270 <= seconds_left <= 330 }}
          {% else %}
            false
          {% endif %}
        {% else %}
          false
        {% endif %}
      attributes:
        seconds_remaining: >
          {% if is_state('timer.kids_wifi_timer', 'active') %}
            {% set finishes = state_attr('timer.kids_wifi_timer', 'finishes_at') %}
            {% if finishes %}
              {% set finish_time = as_timestamp(finishes) %}
              {% set current_time = as_timestamp(now()) %}
              {{ (finish_time - current_time) | int }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}

    ### SMOKE DETECTOR TEST REMINDER ###
    - name: "Smoke Detector Test Due"
      unique_id: smoke_detector_test_due
      state: >
        {{ is_state('input_boolean.smoke_detector_test_needed', 'on') and
           (states('input_datetime.smoke_detector_snooze_until') in ['unknown', 'unavailable'] or
            now() >= states('input_datetime.smoke_detector_snooze_until') | as_datetime | as_local) }}
      icon: mdi:smoke-detector-alert
    ### END SMOKE DETECTOR ###

    - name: "HVAC Bleach Reminder Due"
      unique_id: hvac_bleach_reminder_due
      state: >
        {% set last_bleached = states('input_datetime.hvac_last_bleached') | as_datetime | as_local %}
        {% set days_since = (now().date() - last_bleached.date()).days %}
        {% set snooze_time = states('input_datetime.hvac_snooze_bleach_alert_until') %}

        {% set snooze_active = false %}
        {% if snooze_time not in ['unknown', 'unavailable', ''] %}
          {% set snooze_active = now() < (snooze_time | as_datetime | as_local) %}
        {% endif %}

        {% set test_mode = is_state('input_boolean.hvac_bleach_test', 'on') %}

        {{ (days_since >= 28 and now().hour >= 8 and not snooze_active) or test_mode }}

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:pipe-leak
        {% else %}
          mdi:pipe
        {% endif %}
