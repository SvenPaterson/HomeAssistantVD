# Template sensors for tracking the sump pump activations
- sensor:
    - name: "Sump Pump Activations Daily"
      state: "{{ states('input_number.sump_pump_activations_daily') }}"
      unit_of_measurement: "num"
      icon: mdi:counter

    - name: "Sump Pump Lifetime Activations"
      state: "{{ states('input_number.sump_pump_lifetime_activations') }}"
      unit_of_measurement: "num"
      icon: mdi:counter

    - name: "Sump Pump Runtime Daily"
      state: "{{ states('input_number.sump_pump_runtime_daily') }}"
      unit_of_measurement: "s"
      icon: mdi:timer

    - name: "Sump Pump Total Hours"
      state: "{{ states('input_number.sump_pump_total_hrs') }}"
      unit_of_measurement: "hrs"
      icon: mdi:clock

    - name: "Sump Pump Average Duration Per Activation"
      state: >
        {% set activations = states('input_number.sump_pump_activations_daily') | float %}
        {% set runtime = states('input_number.sump_pump_runtime_daily') | float %}
        {{ (runtime / activations) if activations > 0 else 0 }}
      unit_of_measurement: "s"
      icon: mdi:timer

    - name: HACS Pending Updates
      state: >
        {{ states.update
            | selectattr('entity_id','search','^update\.hacs')
            | selectattr('state','eq','on')
            | list | count }}


- binary_sensor:
    # For Govee bluetooth thermohygrometer battery level alert
    # Ignores devices that have been unavailable for less than 60 minutes
    - name: "Device With Low Battery"
      state: >
        {% set govee_sensors = [
          'sensor.basement_thermohygrometer_battery',
          'sensor.guest_room_thermohygrometer_battery',
          'sensor.master_bedroom_thermohygrometer_battery'
        ] %}
        {% set low_battery_devices = [] %}
        {% for sensor in govee_sensors %}
          {% set sensor_state = states(sensor) %}
          {% if sensor_state not in ['unknown', 'unavailable'] %}
            {# Device is available, check battery level #}
            {% if sensor_state|float(default=100) < 30 %}
              {% set low_battery_devices = low_battery_devices + [sensor] %}
            {% endif %}
          {% elif sensor_state in ['unknown', 'unavailable'] %}
            {# Device is unavailable, check how long #}
            {% set last_changed = state_attr(sensor, 'last_changed') %}
            {% if last_changed %}
              {% set minutes_unavailable = (now() - last_changed).total_seconds() / 60 %}
              {# Only trigger if unavailable for more than 60 minutes #}
              {% if minutes_unavailable > 60 %}
                {% set low_battery_devices = low_battery_devices + [sensor] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ low_battery_devices|length > 0 }}
      device_class: battery
      icon: mdi:battery

    ### IRRIGATION ALERT ###
    # 1. Current-day "hot" flag
    - name: "Hot Day 24h Max 80F"
      unique_id: hot_day_24h_max_80f
      state: "{{ states('sensor.outdoor_temp_max_24h')|float(0) >= 80 }}"
      device_class: heat

    # 2. 7-day rain deficit (< 0.5 in)
    - name: "Weekly Rain Below Target"
      unique_id: bs_weekly_rain_deficit
      state: >
        {% set v = states('sensor.rain_in_past_7_days_in') %}
        {{ v not in ['unknown','unavailable','none'] and v|float < 0.5 }}
      icon: mdi:weather-rainy

    # 3. All of last 3 days hit ≥ 80 °F
    - name: "Hot Streak Last 3 Days"
      unique_id: bs_hot_streak_3
      state: >
        {{ is_state('sensor.hot_streak_last_3_days', 'True') }}
      icon: mdi:sun-thermometer

    # 4. No precip in next 3 days
    - name: "No Rain Next 3 Days"
      unique_id: bs_no_rain_next3
      state: >
        {{ states('sensor.rain_next_3_days_in')|float(1) < 0.1 }}
      icon: mdi:white-balance-sunny

    # 5. Final irrigation alert condition
    - name: "Irrigation Needed Condition"
      unique_id: bs_irrigation_needed
      state: >
        {{
          is_state('input_boolean.test_override_irrigation', 'on') or
          (
            is_state('binary_sensor.weekly_rain_below_target', 'on') and
            is_state('binary_sensor.hot_streak_last_3_days', 'on') and
            is_state('binary_sensor.no_rain_next_3_days', 'on') and
            is_state('input_boolean.watered_recently', 'off')
          )
        }}
    ### END IRRIGATION ###
    ### HOT WATER TANK ###
    - name: "Hot Water Low Temperature"
      state: >
        {% set temp_state = states('sensor.econet_hpwh_upper_tank_temperature') %}
        {% if temp_state not in ['unknown', 'unavailable'] %}
          {{ temp_state | float(0) < 100 }}
        {% else %}
          false
        {% endif %}
      device_class: problem

    - name: "Hot Water Tank Lower Sensor Unavailable 6+ Hours"
      unique_id: hot_water_sensor_unavailable_6hr
      state: >
        {% set sensor_state = states('sensor.econet_hpwh_upper_tank_temperature') %}
        {% if sensor_state in ['unknown', 'unavailable'] %}
          {% set last_changed = state_attr('sensor.econet_hpwh_upper_tank_temperature', 'last_changed') %}
          {% if last_changed %}
            {{ (now() - last_changed).total_seconds() > 21600 }}
          {% else %}
            false
          {% endif %}
        {% else %}
          false
        {% endif %}
      device_class: problem
      icon: mdi:water-thermometer-outline
    ### END HOT WATER TANK ###

    - name: "Kids WiFi 5 Min Warning"
      state: >
        {% if is_state('timer.kids_wifi_timer', 'active') %}
          {% set finishes = state_attr('timer.kids_wifi_timer', 'finishes_at') %}
          {% if finishes %}
            {% set finish_time = as_timestamp(finishes) %}
            {% set current_time = as_timestamp(now()) %}
            {% set seconds_left = finish_time - current_time %}
            {{ 270 <= seconds_left <= 330 }}
          {% else %}
            false
          {% endif %}
        {% else %}
          false
        {% endif %}
      attributes:
        seconds_remaining: >
          {% if is_state('timer.kids_wifi_timer', 'active') %}
            {% set finishes = state_attr('timer.kids_wifi_timer', 'finishes_at') %}
            {% if finishes %}
              {% set finish_time = as_timestamp(finishes) %}
              {% set current_time = as_timestamp(now()) %}
              {{ (finish_time - current_time) | int }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}

    - name: "HVAC Bleach Reminder Due"
      unique_id: hvac_bleach_reminder_due
      state: >
        {% set last_bleached = states('input_datetime.hvac_last_bleached') | as_datetime | as_local %}
        {% set days_since = (now().date() - last_bleached.date()).days %}
        {% set is_saturday = now().weekday() == 5 %}
        {% set snooze_time = states('input_datetime.hvac_snooze_bleach_alert_until') %}

        {# Snooze logic unchanged #}
        {% set snooze_active = false %}
        {% if snooze_time not in ['unknown', 'unavailable', ''] %}
          {% set snooze_dt = snooze_time | as_datetime | as_local %}
          {% set snooze_active = now() < snooze_dt %}
        {% endif %}

        {% set snooze_due = false %}
        {% if snooze_time not in ['unknown', 'unavailable', ''] %}
          {% set snooze_dt = snooze_time | as_datetime | as_local %}
          {% set snooze_due = now() >= snooze_dt and snooze_dt.year > 1970 %}
        {% endif %}

        {# Test override #}
        {% set test_mode = is_state('input_boolean.hvac_bleach_test', 'on') %}

        {{ ((days_since >= 28 and is_saturday and now().hour >= 8 and not snooze_active) or snooze_due) or test_mode }}

      icon: >
        {% if is_state(this.entity_id, 'on') %}
          mdi:pipe-leak
        {% else %}
          mdi:pipe
        {% endif %}
