# Template sensors for tracking the sump pump activations
- sensor:
    - name: "Sump Pump Activations Daily"
      state: "{{ states('input_number.sump_pump_activations_daily') }}"
      unit_of_measurement: "num"
      icon: mdi:counter

    - name: "Sump Pump Lifetime Activations"
      state: "{{ states('input_number.sump_pump_lifetime_activations') }}"
      unit_of_measurement: "num"
      icon: mdi:counter

    - name: "Sump Pump Runtime Daily"
      state: "{{ states('input_number.sump_pump_runtime_daily') }}"
      unit_of_measurement: "s"
      icon: mdi:timer

    - name: "Sump Pump Total Hours"
      state: "{{ states('input_number.sump_pump_total_hrs') }}"
      unit_of_measurement: "hrs"
      icon: mdi:clock

    - name: "Sump Pump Average Duration Per Activation"
      state: >
        {% set activations = states('input_number.sump_pump_activations_daily') | float %}
        {% set runtime = states('input_number.sump_pump_runtime_daily') | float %}
        {{ (runtime / activations) if activations > 0 else 0 }}
      unit_of_measurement: "s"
      icon: mdi:timer

- binary_sensor:
    # For Govee bluetooth thermohygrometer battery level alert
    - name: "Device With Low Battery"
      state: >
        {{
          [
            states('sensor.basement_thermohygrometer_battery')|float(default=0),
            states('sensor.guest_room_thermohygrometer_battery')|float(default=0),
            states('sensor.master_bedroom_thermohygrometer_battery')|float(default=0)
          ]
          | select('lt', 15)
          | list
          | length > 0
        }}
      device_class: battery
      icon: mdi:battery

### IRRIGATION ALERT ###
    # 1. Current-day "hot" flag
    - name: "Hot Day 24h Max 80F"
      unique_id: bs_hot_day_daily
      state: "{{ states('sensor.outdoor_temp_max_24h')|float(0) >= 80 }}"
      device_class: heat

    # 2. 7-day rain deficit (< 0.5 in)
    - name: "Weekly Rain Below Target"
      unique_id: bs_weekly_rain_deficit
      state: >
        {% set v = states('sensor.rain_in_past_7_days') %}
        {{ v not in ['unknown','unavailable','none'] and v|float < 0.5 }}
      icon: mdi:weather-rainy

    # 3. All of last 3 days hit ≥ 80 °F
    - name: "Hot Streak Last 3 Days"
      unique_id: bs_hot_streak_3
      state: >
        {{ states('sensor.hot_days_last_3')|int(0) >= 3 }}
      icon: mdi:sun-thermometer

    # 4. No precip in next 3 days
    - name: "No Rain Next 3 Days"
      unique_id: bs_no_rain_next3
      state: >
        {{ states('sensor.rain_next_3_days_in')|float(1) < 0.1 }}
      icon: mdi:white-balance-sunny

    # 5. Final irrigation alert condition
    - name: "Irrigation Needed Condition"
      unique_id: bs_irrigation_needed
      state: >
        {{
          is_state('input_boolean.test_override_irrigation', 'on') or
          (
            is_state('binary_sensor.weekly_rain_below_target', 'on') and
            is_state('binary_sensor.hot_streak_last_3_days', 'on') and
            is_state('binary_sensor.no_rain_next_3_days', 'on') and
            is_state('input_boolean.watered_recently', 'off')
          )
        }}
### END IRRIGATION ###

    - name: "Hot Water Low Temperature"
      state: >
        {{ states('sensor.econet_hpwh_upper_tank_temperature') | float(0) < 110 }}
      device_class: problem

    - name: "Kids WiFi 5 Min Warning"
      state: >
        {% if is_state('timer.kids_wifi_timer', 'active') %}
          {% set finishes = state_attr('timer.kids_wifi_timer', 'finishes_at') %}
          {% if finishes %}
            {% set finish_time = as_timestamp(finishes) %}
            {% set current_time = as_timestamp(now()) %}
            {% set seconds_left = finish_time - current_time %}
            {{ 270 <= seconds_left <= 330 }}
          {% else %}
            false
          {% endif %}
        {% else %}
          false
        {% endif %}
      attributes:
        seconds_remaining: >
          {% if is_state('timer.kids_wifi_timer', 'active') %}
            {% set finishes = state_attr('timer.kids_wifi_timer', 'finishes_at') %}
            {% if finishes %}
              {% set finish_time = as_timestamp(finishes) %}
              {% set current_time = as_timestamp(now()) %}
              {{ (finish_time - current_time) | int }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}