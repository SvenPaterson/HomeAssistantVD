sump_pump_activations_daily:
  name: "Daily Activations of Sump Pump"
  min: 0
  max: 10000
  step: 1
  unit_of_measurement: "#"

sump_pump_lifetime_activations:
  name: "The total number of occurances of the primary sump pump running"
  min: 0
  max: 1000000
  step: 1
  unit_of_measurement: "#"

sump_pump_runtime_daily:
  name: "Daily Total Runtime of Sump Pump in seconds"
  min: 0
  max: 1000000
  step: 1
  unit_of_measurement: "secs"

sump_pump_total_hrs:
  name: "Total # of machine hours of sump pump"
  min: 0
  max: 1000000
  step: 0.1
  unit_of_measurement: "hrs"

sump_pump_last_runtime:
  name: "The # of secs the most recent sump pump activation lasted"
  min: 0
  max: 1000000
  step: 1
  unit_of_measurement: "secs"

# Historical temperature storage for hot day tracking
yesterday_max_temp:
  name: "Yesterday Max Temperature"
  min: -50
  max: 150
  step: 0.1
  unit_of_measurement: "°F"

day_before_yesterday_max_temp:
  name: "Day Before Yesterday Max Temperature"
  min: -50
  max: 150
  step: 0.1
  unit_of_measurement: "°F"

three_days_ago_max_temp:
  name: "Three Days Ago Max Temperature"
  min: -50
  max: 150
  step: 0.1
  unit_of_measurement: "°F"

ben_screen_time:
  name: "Screen Time for Ben"
  min: 0
  max: 60
  step: 5
  unit_of_measurement: "mins"

lewis_screen_time:
  name: "Screen Time for Lewis"
  min: 0
  max: 60
  step: 5
  unit_of_measurement: "mins"