test_sharkclean_pro_session_dock:
  alias: 'Test: SharkClean Pro session + dock'
  mode: single
  sequence:
  - data:
      command: Talk to SharkClean Pro
    action: google_assistant_sdk.send_text_command
  - delay: 00:00:02
  - data:
      command: Send my robot to the base
    action: google_assistant_sdk.send_text_command
  description: ''
wake_stephen_s_office_pc:
