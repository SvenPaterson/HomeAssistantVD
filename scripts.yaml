tv_remote_mute_toggle:
  alias: TV Remote - Mute Toggle (Router)
  mode: single
  sequence:
  - variables:
      fr_lgtv: media_player.family_room_lgtv
      fr_cast: media_player.family_room_tv
      bs_cast: media_player.basement_tv
      fr_source: '{{ state_attr(fr_lgtv, ''source'') | default('''') }}'
