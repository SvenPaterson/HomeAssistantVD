  - action: wake_on_lan.send_magic_packet
    metadata: {}
    data:
      broadcast_port: 9
      mac: 10:FF:E0:96:3B:50
  alias: Wake Stephen's Office PC
  description: ''
bank_of_dad_apply_transaction:
  alias: Bank of Dad - Apply transaction
  mode: single
  sequence:
  - variables:
      who: '{{ states(''input_select.bank_tx_who'') }}'
      tx_type: '{{ states(''input_select.bank_tx_type'') }}'
      amt: '{{ states(''input_number.bank_tx_amount'')|float(0) }}'
      entity: '{% if who == ''Ben'' %}input_number.ben_balance {% elif who == ''Lewis''
        %}input_number.lewis_balance {% else %}input_number.ben_balance{% endif %}

        '
      current: '{{ states(entity)|float(0) }}'
      new_value: "{% if tx_type == 'Deposit' %}\n  {{ (current + amt) | round(2) }}\n{%
        else %}\n  {{ max(current - amt, 0) | round(2) }}\n{% endif %}\n"
      note: '{{ now().strftime(''%Y-%m-%d %H:%M'') }} — {{ who }} — {{ tx_type }}
        ${{ ''%.2f''|format(amt) }} → ${{ ''%.2f''|format(new_value) }}

        '
  - condition: template
    value_template: '{{ amt > 0 }}'
  - target:
      entity_id: '{{ entity }}'
    data:
      value: '{{ new_value }}'
    action: input_number.set_value
  - target:
      entity_id: input_text.bank_of_dad_last_tx
    data:
      value: '{{ note }}'
    action: input_text.set_value
  - data:
      name: Bank of Dad
      message: '{{ note }}'
    action: logbook.log
  - target:
      entity_id: input_number.bank_tx_amount
    data:
      value: 0
    action: input_number.set_value
  - data:
      title: Bank of Dad
      message: '{{ note }}'
    action: notify.parents_phones
  description: ''
cast_bank_of_dad:
  alias: Cast Bank of Dad to TV
  sequence:
  - data:
      entity_id: media_player.family_room_lgtv
      command: system.launcher/open
      payload:
        target: http://192.168.1.100:8123/lovelace/bank-of-dad
    action: webostv.command
  mode: single
