# A. Integrate OWM rain-rate (in/hr) → cumulative depth (in)
- platform: integration
  name: rain_cumulative_in
  unique_id: int_rain_cumulative
  source: sensor.openweathermap_current_rain
  method: trapezoidal
  unit_time: h

# B. 7-day rainfall = change in cumulative over sliding 7 days
- platform: statistics
  name: "Rain in Past 7 Days"  # Simplified name
  unique_id: st_rain_7
  entity_id: sensor.rain_cumulative_in
  state_characteristic: change
  max_age:
    days: 7

# C. Track today's daily max temperature    
- platform: statistics
  name: "Outdoor Temp Max 24h"  # Simplified name
  unique_id: st_outdoor_max_24h
  entity_id: sensor.home_hvac_outdoor_temperature
  state_characteristic: value_max
  max_age:
    hours: 24

# Get the current WAN IP address every 5mins
- platform: rest
  name: External IP
  resource: "https://api.ipify.org/?format=json"
  value_template: "{{ value_json.ip }}"
  scan_interval: 300
