low_battery:
  name: A device has low battery
  done_message: clear_notification
  entity_id: binary_sensor.device_with_low_battery
  state: "on"
  repeat: 60
  can_acknowledge: true
  skip_first: false
  notifiers:
    - mobile_app_stephens_iphone
  data:
    message: "A device has low battery"
    title: "Low Battery Alert"
    tag: "low-battery"
    actions:
      - action: "URI"
        title: "Check Status"
        uri: "/system-status/battery-levels"


irrigation_needed:
  name: Lawn Irrigation Needed
  title: "🌱 Lawn Needs Water"
  message: >
    Irrigation Needed
    
    Rain Last 7: {{ states('sensor.rain_in_past_7_days')|float(0)|round(2) }}"
    Rain Next 3: {{ states('sensor.rain_next_3_days_in')|float(0)|round(2) }}"
  done_message: "Irrigation alert cleared"
  entity_id: binary_sensor.irrigation_needed_condition
  state: "on"
  repeat: 
    - 360   # 6 hours
    - 720   # 12 hours  
    - 1440  # Then daily
  can_acknowledge: true
  skip_first: false
  notifiers:
    - mobile_app_your_phone  # Replace with your notifier
  data:
    tag: "irrigation-alert"
    group: "irrigation"
    color: "#2E7D32"
    notification_icon: "mdi:grass"
    actions:
      - action: "WATERED"
        title: "✅ Watered"
      - action: "ACKNOWLEDGE"
        title: "🔕 Acknowledge"

# in the future - implement automatic watering with sprinklers
# could even use soil moister level with a probe

hot_water_temperature_low:
  name: Hot Water Temperature Low
  entity_id: binary_sensor.hot_water_low_temperature
  state: "on"
  repeat:
    - 30
    - 60
  can_acknowledge: true
  skip_first: false
  notifiers:
    - parents_phones  # Uncomment when ready
  title: "Hot Water Temperature Low"
  message: "Water temperature: ({{ states('sensor.econet_hpwh_upper_tank_temperature') | float(0)}}°F). Would you like to turn on Boost Mode?"
  data:
    url: "/lovelace/climate"
    actions:
      - action: "ENABLE_HOT_WATER_BOOST"
        title: "Turn on Boost Mode"
      - action: "DISMISS_HOT_WATER_ALERT"
        title: "Dismiss"

hot_water_sensor_error: # alerts me if the hot water integration hasn't recieved a signal in 6hrs
  name: Hot Water Sensor Error
  entity_id: binary_sensor.hot_water_tank_lower_sensor_unavailable_6_hours
  state: "on"
  repeat:
    - 60    # 1hr
    - 120   # 2hrs
    - 360   # 6hrs
    - 1440  # 24hrs
  can_acknowledge: true
  skip_first: false
  notifiers:
    - mobile_app_stephens_iphone
  title: "Hot Water Sensor Error"
  message: "Hot water temperature sensor has been unavailable for over 6 hours. Please check the system."
  data:
    url: "/lovelace/climate"

hvac_bleach_reminder:
  name: "HVAC Condensate Line Needs Bleaching"
  message: "Time to bleach the HVAC condensate line! It's been 4+ weeks since last maintenance."
  done_message: "HVAC condensate line reminder cleared."
  entity_id: binary_sensor.hvac_reminder_due
  state: 'on'
  repeat:
    - 120  # 2 hours
    - 360  # 6 hours  
    - 1440 # 24 hours
  can_acknowledge: false
  skip_first: false
  notifiers:
    - mobile_app_stephens_iphone
  data:
    actions:
      - action: "hvac_drain_bleached"
        title: "Drain Bleached"
        icon: "sfsymbols:checkmark.circle.fill"
      - action: "hvac_remind_home_today"  
        title: "Remind Me When I Get Home Today"
        icon: "sfsymbols:house.fill"
      - action: "hvac_remind_next_week"
        title: "Remind Me Next Week"
        icon: "sfsymbols:calendar"