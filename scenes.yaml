# scenes.yaml
- id: '1703422760932'
  name: All Downstairs Lights Off
  icon: mdi:lightbulb-group-off-outline
  entities:
    switch.backyard_landscape_lights:          off
    switch.tasmota_2:                          off
    switch.family_room_sound_bar:              off
    switch.tasmota_3:                          off
    switch.s31_8_livingroomlamp_living_room_lamp: off
    switch.dining_room_shelf_lights:           off
    switch.s31_9_livingroomlamp_living_room_lamp: off
    switch.tasmota_4:                          off
    light.family_room_lights:
      state: 'off'
      brightness: 1            # optional: ensures lights don’t power-up bright

- id: '1726144246562'
  name: Important Announcement Volume
  entities:
    media_player.kitchen_speaker:
      state: 'on'
      attributes:
        volume_level: 1.0
      is_volume_muted: false
    media_player.family_speaker:
      state: 'on'
      attributes:
        volume_level: 1.0
  icon: mdi:volume-high
  metadata: {}
- id: '1726121346563'
  name: Return to Normal Volume
  entities:
    media_player.kitchen_speaker:
      state: 'on'
      attributes:
        volume_level: 0.3
      is_volume_muted: false
    media_player.family_speaker:
      state: 'on'
      attributes:
        volume_level: 0.3
  icon: mdi:volume-medium
  metadata: {}
